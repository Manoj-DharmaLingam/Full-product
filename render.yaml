services:
  - type: web
    name: emergency-icu-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RESERVATION_TTL_MINUTES
        value: "15"
      - key: AMBULANCE_AVERAGE_SPEED_KMH
        value: "45.0"
      - key: MAX_REASONABLE_DISTANCE_KM
        value: "30.0"
      - key: OPTIMAL_ICU_BEDS
        value: "3"
